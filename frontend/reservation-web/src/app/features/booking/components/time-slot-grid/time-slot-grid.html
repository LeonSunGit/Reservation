<div class="time-slot-grid">

@for (slotItem of displaySlots(); track slotItem) {
  <div  >
    <button
      [class]="'time-slot time-slot--' + slotItem.state"
      [disabled]="slotItem.state == 'booked-by-other'||slotItem.state == 'booked-by-me'"
      (click)="selectSlot(slotItem.slot)"

    >
      {{ slotItem.slot.startTime }} - {{ slotItem.slot.endTime }}
    </button>
  </div>
}
</div>
